services:
  - type: web
    name: gestion_commerciale
    env: php
    buildCommand: |
      composer install
      php artisan key:generate
      php artisan migrate --force
    startCommand: php artisan serve --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false

  - type: cron
    name: subscription-reminders
    env: php
    schedule: "0 8 * * *"  # Tous les jours à 8h
    buildCommand: composer install --no-dev
    startCommand: php artisan subscriptions:remind
